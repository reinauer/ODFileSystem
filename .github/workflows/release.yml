name: ODFileSystem Draft Release

on:
  push:
    branches:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    container: stefanreinauer/amiga-gcc:gcc-v13.3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark git directory as safe
        run: git config --global --add safe.directory '*'

      - name: Build release artifacts
        env:
          ODFS_GIT_VERSION: ${{ github.ref_name }}
        run: |
          make amiga
          make amiga-test
          make rom
          make rom-test
          make tools

      - name: Package release files
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          dist_dir="dist/ODFileSystem-${RELEASE_VERSION}"
          mkdir -p "${dist_dir}"
          cp build/amiga/ODFileSystem "${dist_dir}/ODFileSystem"
          cp build/amiga-test/ODFileSystem "${dist_dir}/ODFileSystem-test"
          cp build/amiga-rom/ODFileSystem "${dist_dir}/ODFileSystem-rom"
          cp build/amiga-rom-test/ODFileSystem "${dist_dir}/ODFileSystem-rom-test"
          cp platform/amiga/dosdrivers/CD0 "${dist_dir}/CD0"
          cp platform/amiga/dosdrivers/CD0.info "${dist_dir}/CD0.info"
          sed -i 's|^FileSystem  = .*|FileSystem  = L:ODFileSystem|' "${dist_dir}/CD0"
          cp README.md "${dist_dir}/README-${RELEASE_VERSION}.md"
          tar -C dist -czf "dist/ODFileSystem-${RELEASE_VERSION}.tar.gz" "ODFileSystem-${RELEASE_VERSION}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/ODFileSystem-*.tar.gz
            dist/ODFileSystem-*/
          if-no-files-found: error

  release:
    name: Create GitHub draft release
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: ODFileSystem ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/ODFileSystem-*.tar.gz
